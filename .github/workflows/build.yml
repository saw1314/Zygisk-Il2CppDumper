name: Build

on:
  workflow_dispatch:
    # 定义输入参数：游戏包名（必填）
    inputs:
      game_package_name:
        description: '目标游戏完整包名（例：com.miHoYo.Yuanshen）'
        required: true
        type: string
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 配置Java环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. 配置Android NDK（指定稳定版r25c，避免兼容问题）
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      # 3. 替换game.h中的包名（核心：自动注入你输入的游戏包名）
      - name: Replace Game Package Name
        run: |
          sed -i "s|#define GamePackageName \".*\"|#define GamePackageName \"${{ github.event.inputs.game_package_name }}\"|g" module/src/main/cpp/game.h
          # 验证替换结果（可选）
          cat module/src/main/cpp/game.h | grep GamePackageName

      # 4. 赋予Gradlew执行权限并编译
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build with Gradle
        run: ./gradlew :module:assembleRelease --stacktrace

      # 5. 收集构建产物（ZIP模块）并上传（使用v4版本，避免废弃报错）
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Il2CppDumper-Module-${{ github.event.inputs.game_package_name }}
          path: module/build/outputs/module/release/module-release.zip
